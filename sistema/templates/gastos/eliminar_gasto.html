{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmar Eliminación</h4>
            </div>
            <div class="card-body text-center">
                <i class="bi bi-question-circle display-1 text-warning"></i>
                <h5 class="mt-3">¿Estás seguro de eliminar este gasto?</h5>
                <p><strong>{{ gasto.titulo }}</strong></p>
                <p>Monto: <strong class="text-danger">$ {{ gasto.monto|floatformat:0 }}</strong></p>
                <p>Fecha: {{ gasto.fecha|date:"d/m/Y" }}</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <a href="{% url 'lista_gastos' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Sí, Eliminar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
