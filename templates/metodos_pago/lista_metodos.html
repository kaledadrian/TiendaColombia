{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-credit-card"></i> Métodos de Pago</h2>
    <a href="{% url 'crear_metodo' %}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Nuevo Método
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Método de pago</th>
                        <th>Descripción</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for metodo in metodos %}
                    <tr>
                        <td><i class="bi bi-credit-card-2-front me-2"></i><strong>{{ metodo.nombre }}</strong></td>
                        <td class="text-muted">{{ metodo.descripcion|default:"-" }}</td>
                        <td class="text-end">
                            <a href="{% url 'editar_metodo' metodo.id %}" class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a href="{% url 'eliminar_metodo' metodo.id %}" class="btn btn-sm btn-danger">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center text-muted py-4">
                            <i class="bi bi-info-circle"></i> No hay métodos de pago registrados
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
